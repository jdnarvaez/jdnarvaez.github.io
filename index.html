    <script>
      // Resolve theme before paint (no flash). Stored choice wins, else system.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          // Default to dark on first visit (ignore system preference).
          if (t !== 'light' && t !== 'dark') {
            t = 'dark';
          }
          var de = document.documentElement;
          de.classList.add(t);
          de.setAttribute('data-theme', t);
          de.style.colorScheme = t;
          var bg = t === 'light' ? '#f3efe6' : '#0a0908';
          var fg = t === 'light' ? '#211d17' : '#ece7dd';
          de.style.setProperty('--boot-bg', bg);
          de.style.setProperty('--boot-fg', fg);
          de.style.background = bg;
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
