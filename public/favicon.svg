<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- JDN above a neon-orange slash, with a transparent cut-through border:
       the slash is masked by the letters dilated by a stroke, leaving a small
       transparent gap where they intersect. Letters flip color for chrome. -->
  <style>
    .l { fill: #141210; }
    @media (prefers-color-scheme: dark) {
      .l { fill: #ece7dd; }
    }
  </style>
  <defs>
    <mask id="jdn-gap">
      <rect width="100" height="100" fill="#fff" />
      <text
        x="50"
        y="53"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace"
        font-size="48"
        font-weight="700"
        letter-spacing="-1.5"
        fill="#000"
        stroke="#000"
        stroke-width="5"
        stroke-linejoin="round"
        paint-order="stroke"
      >
        JDN
      </text>
    </mask>
  </defs>

  <!-- slash, cut by the letter halo -->
  <path d="M64 10 L80 10 L36 90 L20 90 Z" fill="#ff6a1a" mask="url(#jdn-gap)" />

  <!-- letters on top -->
  <text
    x="50"
    y="53"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace"
    font-size="48"
    font-weight="700"
    letter-spacing="-1.5"
    class="l"
  >
    JDN
  </text>
</svg>
